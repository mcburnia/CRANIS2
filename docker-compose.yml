services:
  nginx:
    image: nginx:alpine
    container_name: cranis2_nginx
    ports:
      - "3002:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - postgres
      - neo4j
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - cranis2_net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: cranis2_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      DEV_SKIP_EMAIL: ${DEV_SKIP_EMAIL}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_ENCRYPTION_KEY: ${GITHUB_ENCRYPTION_KEY}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      CODEBERG_CLIENT_ID: ${CODEBERG_CLIENT_ID}
      CODEBERG_CLIENT_SECRET: ${CODEBERG_CLIENT_SECRET}
      CODEBERG_WEBHOOK_SECRET: ${CODEBERG_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRODUCT_ID: ${STRIPE_PRODUCT_ID}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      FORGEJO_ADMIN_TOKEN: ${FORGEJO_ADMIN_TOKEN}
      FORGEJO_URL: ${FORGEJO_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SCW_ACCESS_KEY: ${SCW_ACCESS_KEY}
      SCW_SECRET_KEY: ${SCW_SECRET_KEY}
      SCW_REGION: ${SCW_REGION}
      SCW_BUCKET_NAME: ${SCW_BUCKET_NAME}
    volumes:
      - ./docs:/app/docs:ro
      - ./data/snapshots:/app/data/snapshots
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - cranis2_net
    restart: unless-stopped

  # ── Test Stack (docker compose --profile test up -d) ──────────────────
  # Isolated databases + backend for tests. NEVER shares data with live.

  neo4j_test:
    image: neo4j:5-community
    container_name: cranis2_neo4j_test
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: 128m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 128m
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "7476:7474"
      - "7699:7687"
    volumes:
      - cranis2_neo4j_test_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - cranis2_net
    profiles:
      - test
    restart: unless-stopped

  backend_test:
    build: ./backend
    container_name: cranis2_backend_test
    ports:
      - "3011:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/cranis2_test
      NEO4J_URI: bolt://neo4j_test:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost:3002
      DEV_SKIP_EMAIL: "true"
      LOG_LEVEL: warn
      CRANIS2_TEST_MODE: "true"
      # Webhook/encryption secrets must match live backend so tests can
      # generate valid HMAC signatures and encrypt/decrypt PATs
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      CODEBERG_WEBHOOK_SECRET: ${CODEBERG_WEBHOOK_SECRET}
      GITHUB_ENCRYPTION_KEY: ${GITHUB_ENCRYPTION_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      CODEBERG_CLIENT_ID: ${CODEBERG_CLIENT_ID}
      CODEBERG_CLIENT_SECRET: ${CODEBERG_CLIENT_SECRET}
      FORGEJO_ADMIN_TOKEN: ${FORGEJO_ADMIN_TOKEN}
      FORGEJO_URL: ${FORGEJO_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRODUCT_ID: ${STRIPE_PRODUCT_ID}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      # Placeholder keys — prevent actual AI calls during tests
      RESEND_API_KEY: "re_placeholder"
      ANTHROPIC_API_KEY: "sk-ant-placeholder"
      SCW_ACCESS_KEY: "scw-placeholder"
      SCW_SECRET_KEY: "scw-placeholder"
      SCW_REGION: "fr-par"
      SCW_BUCKET_NAME: "cranis2-test-bucket"
    volumes:
      - ./docs:/app/docs:ro
      - ./data/snapshots-test:/app/data/snapshots
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      postgres:
        condition: service_healthy
      neo4j_test:
        condition: service_healthy
    networks:
      - cranis2_net
    profiles:
      - test
    restart: unless-stopped

  test-runner:
    build:
      context: .
      dockerfile: test-runner/Dockerfile
    container_name: cranis2_test_runner
    environment:
      TEST_PG_HOST: postgres
      TEST_PG_PORT: "5432"
      TEST_PG_USER: ${POSTGRES_USER}
      TEST_PG_PASSWORD: ${POSTGRES_PASSWORD}
      TEST_NEO4J_URI: bolt://neo4j_test:7687
      TEST_NEO4J_USER: ${NEO4J_USER}
      TEST_NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      TEST_BASE_URL: http://backend_test:3001
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      neo4j_test:
        condition: service_healthy
      backend_test:
        condition: service_started
    networks:
      - cranis2_net
    profiles:
      - test
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: cranis2_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    command: ["postgres", "-c", "shared_buffers=512MB", "-c", "work_mem=4MB", "-c", "effective_cache_size=1536MB", "-c", "maintenance_work_mem=128MB"]
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - cranis2_pg_data:/var/lib/postgresql/data
      - ./postgres/init-forgejo-db.sh:/docker-entrypoint-initdb.d/01-init-forgejo-db.sh:ro
      - ./postgres/init-test-db.sh:/docker-entrypoint-initdb.d/02-init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - cranis2_net
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: cranis2_neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    deploy:
      resources:
        limits:
          memory: 1536M
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - cranis2_neo4j_data:/data
      - cranis2_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - cranis2_net
    restart: unless-stopped

  welcome:
    build: ./welcome
    container_name: cranis2_welcome
    ports:
      - "3004:3004"
    environment:
      WELCOME_USER: ${WELCOME_USER}
      WELCOME_PASS: ${WELCOME_PASS}
      WELCOME_SECRET: ${WELCOME_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "3004"
    volumes:
      - cranis2_welcome_data:/data
    deploy:
      resources:
        limits:
          memory: 96M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cranis2_net
    restart: unless-stopped

  forgejo:
    image: codeberg.org/forgejo/forgejo:10
    container_name: cranis2_forgejo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=forgejo
      - FORGEJO__database__USER=forgejo
      - FORGEJO__database__PASSWD=forgejo_dev_2026
      - FORGEJO__server__ROOT_URL=https://escrow.cranis2.dev
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__DISABLE_SSH=true
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=true
      - FORGEJO__openid__ENABLE_OPENID_SIGNIN=false
    volumes:
      - cranis2_forgejo_data:/data
    networks:
      - cranis2_net
    ports:
      - "3003:3000"

volumes:
  cranis2_welcome_data:
  cranis2_forgejo_data:
  cranis2_pg_data:
  cranis2_neo4j_data:
    external: true
  cranis2_neo4j_logs:
  cranis2_neo4j_test_data:

networks:
  cranis2_net:
    driver: bridge
